<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JollyJacky – Admin 🎀</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f3e5f5 100%); font-family: 'Segoe UI', system-ui, sans-serif; color: #4a1942; }
    header { text-align: center; padding: 26px 20px 14px; border-bottom: 2px dashed #f48fb1; }
    header .sub { font-size: 13px; font-weight: 700; color: #f06292; letter-spacing: 2px; text-transform: uppercase; }
    header h1 { font-size: 25px; font-weight: 900; color: #c2185b; margin-top: 2px; }
    .wrap { padding: 16px; max-width: 560px; margin: 0 auto; }
    .hidden { display: none; }

    .login { background: #fff; border: 2px solid #fce4ec; border-radius: 16px; padding: 22px 18px; box-shadow: 0 2px 12px #f4849018; }
    .login label { font-size: 12px; font-weight: 700; color: #ad1457; display: block; margin-bottom: 6px; }
    .login input { width: 100%; border: 2px solid #f8bbd0; border-radius: 12px; padding: 12px; font-size: 14px; color: #880e4f; background: #fff; outline: none; font-family: inherit; margin-bottom: 12px; }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #f06292, #ce93d8); color: #fff; border: none; border-radius: 14px; padding: 13px; font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .login-msg { font-size: 13px; font-weight: 700; color: #c62828; margin-top: 10px; min-height: 16px; text-align: center; }

    .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #f8bbd0; background: #fff; color: #c2185b; font-weight: 700; font-size: 13px; cursor: pointer; text-align: center; font-family: inherit; }
    .tab.active { background: #f48fb1; border-color: #e91e63; color: #fff; }

    .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .panel-head .count { font-size: 13px; color: #ad1457; font-weight: 700; }
    .toolbar { display: flex; gap: 8px; }
    .btn-sm { background: #fff; border: 2px solid #f8bbd0; color: #c2185b; border-radius: 10px; padding: 7px 12px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: inherit; }

    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .chip { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid #f8bbd0; background: #fff; color: #c2185b; font-family: inherit; }
    .chip.active { background: #f48fb1; border-color: #e91e63; color: #fff; }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .row { background: #fff; border: 2px solid #fce4ec; border-radius: 14px; padding: 12px; box-shadow: 0 2px 12px #f4849018; }
    .row-top { display: flex; gap: 12px; align-items: center; }
    .thumb { width: 84px; height: 39px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: linear-gradient(135deg,#fce4ec,#f3e5f5); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .row-info { flex: 1; min-width: 0; }
    .row-title { font-size: 14px; font-weight: 800; color: #880e4f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { font-size: 12px; color: #ad1457; margin-top: 2px; }
    .del { background: #fff; border: 2px solid #f8bbd0; color: #e91e63; border-radius: 10px; width: 38px; height: 38px; flex-shrink: 0; cursor: pointer; font-size: 16px; font-family: inherit; }
    .status-row { display: flex; gap: 6px; margin-top: 10px; }
    .status-btn { flex: 1; border: 2px solid #f8bbd0; background: #fff; border-radius: 10px; padding: 8px 4px; font-weight: 700; font-size: 12px; cursor: pointer; color: #c2185b; font-family: inherit; }
    .status-btn.aw { background: #fce4ec; border-color: #f48fb1; color: #c2185b; }
    .status-btn.ap { background: #f3e5f5; border-color: #ce93d8; color: #7b1fa2; }
    .played-btn { width: 100%; margin-top: 8px; border: 2px solid #ce93d8; background: #f3e5f5; border-radius: 10px; padding: 9px; font-weight: 800; font-size: 13px; cursor: pointer; color: #7b1fa2; font-family: inherit; }

    .new-event { background: #fff; border: 2px solid #fce4ec; border-radius: 16px; padding: 16px; margin-bottom: 14px; box-shadow: 0 2px 12px #f4849018; }
    .new-event h3 { font-size: 15px; font-weight: 800; color: #c2185b; margin-bottom: 12px; }
    .new-event label { font-size: 12px; font-weight: 700; color: #ad1457; display: block; margin-bottom: 5px; }
    .new-event input { width: 100%; border: 2px solid #f8bbd0; border-radius: 12px; padding: 10px; font-size: 14px; color: #880e4f; background: #fff; outline: none; font-family: inherit; margin-bottom: 10px; }
    .game-picker { max-height: 240px; overflow-y: auto; border: 2px solid #f8bbd0; border-radius: 12px; margin-bottom: 10px; }
    .pick-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid #fce4ec; cursor: pointer; }
    .pick-row:last-child { border-bottom: none; }
    .pick-row input[type=checkbox] { accent-color: #f06292; width: 16px; height: 16px; flex-shrink: 0; }
    .pick-thumb { width: 54px; height: 25px; border-radius: 4px; overflow: hidden; background: #fce4ec; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .pick-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pick-title { font-size: 13px; font-weight: 700; color: #880e4f; }
    .btn-create { width: 100%; background: linear-gradient(135deg,#f06292,#ce93d8); color: #fff; border: none; border-radius: 12px; padding: 12px; font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-create:disabled { opacity: 0.6; cursor: default; }

    .event-card { background: #fff; border: 2px solid #fce4ec; border-radius: 14px; padding: 14px; box-shadow: 0 2px 12px #f4849018; margin-bottom: 10px; }
    .event-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .event-name { font-size: 15px; font-weight: 800; color: #880e4f; }
    .event-date { font-size: 12px; color: #ad1457; margin-top: 2px; }
    .badge-open { background: #fce4ec; color: #c2185b; border: 1.5px solid #f48fb1; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-closed { background: #ede7f6; color: #4a148c; border: 1.5px solid #b39ddb; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .ev-games { margin: 8px 0 10px; }
    .ev-game { display: flex; justify-content: space-between; font-size: 13px; color: #880e4f; padding: 5px 0; border-bottom: 1px dashed #fce4ec; }
    .ev-game:last-child { border-bottom: none; }
    .ev-votes { font-weight: 900; color: #f06292; }
    .ev-total { font-size: 12px; color: #ad1457; margin-bottom: 10px; }
    .event-btns { display: flex; gap: 6px; }
    .toggle-btn { flex: 1; border: 2px solid #f8bbd0; background: #fff; border-radius: 10px; padding: 8px; font-weight: 700; font-size: 12px; cursor: pointer; color: #c2185b; font-family: inherit; }
    .vote-link { flex: 1; border: 2px solid #ce93d8; background: #f3e5f5; border-radius: 10px; padding: 8px; font-weight: 700; font-size: 12px; color: #7b1fa2; text-decoration: none; display: flex; align-items: center; justify-content: center; }

    .loading { text-align: center; padding: 40px 20px; color: #f48fb1; font-weight: 700; }
    .empty { text-align: center; padding: 40px 20px; color: #f48fb1; font-weight: 700; }
    .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#f06292,#ce93d8); color: #fff; padding: 11px 24px; border-radius: 24px; font-weight: 800; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px #f4849055; white-space: nowrap; }
    .toast.show { display: block; }
  </style>
</head>
<body>
<header>
  <div class="sub">JollyJacky</div>
  <h1>Admin-Bereich 🎀</h1>
</header>
<div class="wrap">

  <div id="login">
    <div class="login">
      <label>Admin-Passwort</label>
      <input type="password" id="pw-input" placeholder="Passwort eingeben" />
      <button class="btn-primary" id="login-btn">Anmelden 🦕</button>
      <div class="login-msg" id="login-msg"></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <div class="tabs">
      <button class="tab active" id="tab-games">🎮 Spiele</button>
      <button class="tab" id="tab-events">🗳️ Events</button>
    </div>

    <div id="view-games">
      <div class="panel-head">
        <span class="count" id="game-count">–</span>
        <div class="toolbar">
          <button class="btn-sm" id="reload-games">🔄</button>
          <button class="btn-sm" id="logout-btn">Abmelden</button>
        </div>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="chip active" data-filter="all">Alle</button>
        <button class="chip" data-filter="wished">Gewünscht</button>
        <button class="chip" data-filter="planned">Geplant</button>
      </div>
      <div class="list" id="game-list"><div class="loading">🦕 Lade...</div></div>
    </div>

    <div id="view-events" class="hidden">
      <div class="panel-head">
        <span class="count" id="event-count">–</span>
        <div class="toolbar">
          <button class="btn-sm" id="reload-events">🔄</button>
        </div>
      </div>

      <div class="new-event">
        <h3>🗳️ Neues Event erstellen</h3>
        <label>Name *</label>
        <input type="text" id="ev-name" placeholder='z.B. Horror-Samstag' />
        <label>Datum *</label>
        <input type="date" id="ev-date" required />
        <label>Spiele zur Auswahl (mind. 2 anhaken)</label>
        <div class="game-picker" id="game-picker"><div class="loading">🦕 Lade...</div></div>
        <button class="btn-create" id="create-event-btn">Event erstellen 🦕</button>
      </div>

      <div id="event-list"><div class="loading">🦕 Lade...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====== Supabase-Konfiguration ======
const SUPABASE_URL = "https://xwsgykzubzmkmhohlhmd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3c2d5a3p1Ynpta21ob2hsaG1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDg1NjQsImV4cCI6MjA5NzcyNDU2NH0.inTWUbfQoMQmiq8D0YgxyLDQjUmpIfeWmM9Mj-kXXQc";
const STEAM_PROXY_URL = ""; // <- wird im naechsten Schritt gesetzt (Supabase Edge Function)
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Anonymer Voter-Key pro Browser (fuer den Doppelvote-Schutz). Mit Fallback,
// falls localStorage blockiert ist (z.B. in einer Vorschau-Sandbox).
function jjVoterKey() {
  try {
    var k = localStorage.getItem("jj_voter_key");
    if (!k) {
      k = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ("k" + Date.now() + "_" + Math.random());
      localStorage.setItem("jj_voter_key", k);
    }
    return k;
  } catch (e) {
    if (!window.__jjvk) window.__jjvk = "k" + Date.now() + "_" + Math.random();
    return window.__jjvk;
  }
}
var VOTER_KEY = jjVoterKey();
var pw = sessionStorage.getItem("adminpw") || "";
var games = [];
var events = [];
var gameFilter = "all";

async function api(params) {
  var action = params.action;
  try {
    if (action === "getGames") {
      var r = await db.from("games").select("*");
      if (r.error) throw r.error;
      var games = (r.data || []).map(function (g) {
        return {
          id: String(g.id), title: g.title, genre: g.genre, tag: g.tag,
          status: g.status, votes: Number(g.votes) || 0, cover: g.cover,
          steamUrl: g.steam_url, timesPlayed: Number(g.times_played) || 0
        };
      });
      return { ok: true, games: games };
    }
    if (action === "addGame") {
      var r = await db.rpc("add_game", { p_title: params.title || "", p_genre: params.genre || "", p_tag: params.tag || "", p_cover: params.cover || "", p_steam_url: params.steamUrl || "" });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "vote") {
      var r = await db.rpc("vote_game", { p_game_id: Number(params.id), p_voter_key: VOTER_KEY });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "checkPw") {
      var r = await db.rpc("check_admin", { p_password: params.pw || "" });
      if (r.error) throw r.error; return { ok: !!r.data };
    }
    if (action === "setStatus") {
      var r = await db.rpc("admin_set_status", { p_password: params.pw || "", p_id: Number(params.id), p_status: params.status });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "markPlayed") {
      var r = await db.rpc("admin_mark_played", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "deleteGame") {
      var r = await db.rpc("admin_delete_game", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "getEvents") {
      var r = await db.rpc("get_events");
      if (r.error) throw r.error; return { ok: true, events: r.data || [] };
    }
    if (action === "createEvent") {
      var ids = String(params.gameIds || "").split(",").filter(Boolean).map(Number);
      var r = await db.rpc("admin_create_event", { p_password: params.pw || "", p_name: params.name || "", p_date: params.date || "", p_game_ids: ids });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "setEventStatus") {
      var r = await db.rpc("admin_set_event_status", { p_password: params.pw || "", p_id: Number(params.id), p_status: params.status });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "deleteEvent") {
      var r = await db.rpc("admin_delete_event", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "eventVote") {
      var r = await db.rpc("event_vote", { p_event_id: Number(params.eventId), p_game_id: Number(params.gameId), p_voter_key: VOTER_KEY });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "steamSearch") {
      if (!STEAM_PROXY_URL) return { ok: true, results: [] };
      var res = await fetch(STEAM_PROXY_URL + "?action=search&term=" + encodeURIComponent(params.term || ""));
      return await res.json();
    }
    if (action === "steamInfo") {
      if (!STEAM_PROXY_URL) return { ok: false, error: "steam_proxy_not_configured" };
      var res2 = await fetch(STEAM_PROXY_URL + "?action=info&appId=" + encodeURIComponent(params.appId || ""));
      return await res2.json();
    }
    return { ok: false, error: "unknown_action: " + action };
  } catch (e) {
    return { ok: false, error: (e && e.message) ? e.message : String(e) };
  }
}

function eh(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function ea(s) { return String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function fmtDate(d) {
  if (!d) return '';
  var s = String(d);
  // ISO format: 2026-07-22 or 2026-07-22T...
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3] + '.' + m[2] + '.' + m[1];
  return s;
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ---- Login ----
document.getElementById("login-btn").addEventListener("click", doLogin);
document.getElementById("pw-input").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });

function doLogin() {
  var val = document.getElementById("pw-input").value;
  var msg = document.getElementById("login-msg");
  var btn = document.getElementById("login-btn");
  if (!val) { msg.textContent = "Bitte Passwort eingeben"; return; }
  btn.disabled = true; btn.textContent = "Prüfe... 🦕"; msg.textContent = "";
  api({ action: "checkPw", pw: val }).then(function(data) {
    if (data.ok) {
      pw = val; sessionStorage.setItem("adminpw", pw);
      showPanel(); loadGames(); loadEvents();
    } else { msg.textContent = "❌ Falsches Passwort"; }
  }).catch(function(){ msg.textContent = "❌ Verbindungsfehler"; })
  .finally(function(){ btn.disabled = false; btn.textContent = "Anmelden 🦕"; });
}

document.getElementById("logout-btn").addEventListener("click", function(){
  pw = ""; sessionStorage.removeItem("adminpw");
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("pw-input").value = "";
});

function showPanel() {
  document.getElementById("login").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
}

// ---- Tabs ----
document.getElementById("tab-games").addEventListener("click", function(){ switchTab("games"); });
document.getElementById("tab-events").addEventListener("click", function(){ switchTab("events"); });

function switchTab(tab) {
  document.getElementById("view-games").classList.toggle("hidden", tab !== "games");
  document.getElementById("view-events").classList.toggle("hidden", tab !== "events");
  document.getElementById("tab-games").classList.toggle("active", tab === "games");
  document.getElementById("tab-events").classList.toggle("active", tab !== "games");
}

// ---- Games ----
document.getElementById("reload-games").addEventListener("click", loadGames);

function loadGames() {
  document.getElementById("game-list").innerHTML = '<div class="loading">🦕 Lade...</div>';
  api({ action: "getGames" }).then(function(data) {
    if (data.ok) {
      games = data.games.map(function(g){ return Object.assign(g, {votes: Number(g.votes), id: String(g.id)}); });
      renderGames();
      buildPicker();
    }
  }).catch(function(){ document.getElementById("game-list").innerHTML = '<div class="empty">😕 Verbindungsfehler</div>'; });
}

document.getElementById("filter-row").addEventListener("click", function(e) {
  var btn = e.target.closest("[data-filter]");
  if (!btn) return;
  gameFilter = btn.dataset.filter;
  document.querySelectorAll("[data-filter]").forEach(function(c){ c.classList.remove("active"); });
  btn.classList.add("active");
  renderGames();
});

function renderGames() {
  var filtered = games.filter(function(g){ return gameFilter === "all" || g.status === gameFilter; })
    .sort(function(a,b){ return b.votes - a.votes; });
  document.getElementById("game-count").textContent = filtered.length + " Spiel(e)";
  var list = document.getElementById("game-list");
  if (!filtered.length) { list.innerHTML = '<div class="empty">🦕 Keine Spiele</div>'; return; }
  list.innerHTML = "";
  filtered.forEach(function(g) {
    var div = document.createElement("div");
    div.className = "row";
    div.dataset.id = g.id;

    var thumbHtml = g.cover ? '<img src="' + ea(g.cover) + '" alt="" onerror="this.parentNode.innerHTML=\'🦕\'">' : '🦕';
    var timesHtml = Number(g.timesPlayed||0) > 0 ? " · 🎮 " + g.timesPlayed + "x gespielt" : "";

    div.innerHTML =
      '<div class="row-top">' +
        '<div class="thumb">' + thumbHtml + '</div>' +
        '<div class="row-info">' +
          '<div class="row-title">' + eh(g.title) + '</div>' +
          '<div class="row-meta">🌸 ' + g.votes + (g.genre ? ' · ' + eh(g.genre) : '') + timesHtml + '</div>' +
        '</div>' +
        '<button class="del" data-action="del" title="Löschen">🗑️</button>' +
      '</div>' +
      '<div class="status-row">' +
        '<button class="status-btn ' + (g.status==='wished'?'aw':'') + '" data-action="status" data-status="wished">🌸 Gewünscht</button>' +
        '<button class="status-btn ' + (g.status==='planned'?'ap':'') + '" data-action="status" data-status="planned">💜 Geplant</button>' +
      '</div>' +
      '<button class="played-btn" data-action="played">🎮 Als gespielt markieren' + (Number(g.timesPlayed||0)>0 ? ' (' + g.timesPlayed + 'x)' : '') + '</button>';

    list.appendChild(div);
  });

  list.addEventListener("click", handleGameAction);
}

function handleGameAction(e) {
  var btn = e.target.closest("[data-action]");
  if (!btn) return;
  var row = btn.closest(".row");
  if (!row) return;
  var id = row.dataset.id;
  var g = games.find(function(g){ return g.id === id; });
  if (!g) return;
  var action = btn.dataset.action;
  if (action === "del") { doDelGame(id, g.title); }
  else if (action === "status") { doSetStatus(id, btn.dataset.status); }
  else if (action === "played") { doMarkPlayed(id, g.title); }
}

function doSetStatus(id, status) {
  var g = games.find(function(g){ return g.id===id; }); if (!g || g.status===status) return;
  var prev = g.status; g.status = status; renderGames(); showToast("✓ Status geändert");
  api({ action:"setStatus", id:id, status:status, pw:pw }).then(function(data){
    if (!data.ok) { g.status = prev; renderGames(); showToast("❌ " + (data.error||"Fehler")); }
  }).catch(function(){ g.status = prev; renderGames(); showToast("❌ Verbindungsfehler"); });
}

function doMarkPlayed(id, title) {
  if (!confirm('"' + title + '" als gespielt markieren?\nZähler +1, Status zurück auf Gewünscht.')) return;
  var g = games.find(function(g){ return g.id===id; }); if (!g) return;
  var prevStatus = g.status; var prevTimes = Number(g.timesPlayed||0);
  g.status = "wished"; g.timesPlayed = prevTimes + 1; renderGames(); showToast("🎮 Als gespielt markiert!");
  api({ action:"markPlayed", id:id, pw:pw }).then(function(data){
    if (!data.ok) { g.status = prevStatus; g.timesPlayed = prevTimes; renderGames(); showToast("❌ " + (data.error||"Fehler")); }
  }).catch(function(){ g.status = prevStatus; g.timesPlayed = prevTimes; renderGames(); showToast("❌ Verbindungsfehler"); });
}

function doDelGame(id, title) {
  if (!confirm('"' + title + '" wirklich löschen?')) return;
  var idx = games.findIndex(function(g){ return g.id===id; });
  var backup = games[idx];
  games = games.filter(function(g){ return g.id!==id; }); renderGames();
  api({ action:"deleteGame", id:id, pw:pw }).then(function(data){
    if (!data.ok) { games.splice(idx,0,backup); renderGames(); showToast("❌ " + (data.error||"Fehler")); }
    else { showToast("🗑️ Gelöscht"); buildPicker(); }
  }).catch(function(){ games.splice(idx,0,backup); renderGames(); showToast("❌ Verbindungsfehler"); });
}

// ---- Events ----
document.getElementById("reload-events").addEventListener("click", loadEvents);
document.getElementById("create-event-btn").addEventListener("click", doSubmitEvent);

function buildPicker() {
  var wished = games.filter(function(g){ return g.status !== "played"; }).sort(function(a,b){ return b.votes-a.votes; });
  var picker = document.getElementById("game-picker");
  if (!wished.length) { picker.innerHTML = '<div class="loading" style="padding:12px">Keine Spiele verfügbar</div>'; return; }
  picker.innerHTML = "";
  wished.forEach(function(g) {
    var label = document.createElement("label");
    label.className = "pick-row";
    var thumbHtml = g.cover ? '<img src="' + ea(g.cover) + '" alt="" onerror="this.parentNode.innerHTML=\'🦕\'">' : '🦕';
    label.innerHTML =
      '<input type="checkbox" class="game-pick" value="' + ea(g.id) + '">' +
      '<div class="pick-thumb">' + thumbHtml + '</div>' +
      '<span class="pick-title">' + eh(g.title) + '</span>';
    picker.appendChild(label);
  });
}

function loadEvents() {
  document.getElementById("event-list").innerHTML = '<div class="loading">🦕 Lade...</div>';
  api({ action: "getEvents" }).then(function(data) {
    if (data.ok) { events = data.events; renderEvents(); }
  }).catch(function(){ document.getElementById("event-list").innerHTML = '<div class="empty">😕 Verbindungsfehler</div>'; });
}

function renderEvents() {
  document.getElementById("event-count").textContent = events.length + " Event(s)";
  var el = document.getElementById("event-list");
  if (!events.length) { el.innerHTML = '<div class="empty">🦕 Noch keine Events</div>'; return; }
  el.innerHTML = "";
  var sorted = events.slice().sort(function(a,b){ return Number(b.id)-Number(a.id); });
  sorted.forEach(function(ev) {
    var totalVotes = ev.games.reduce(function(s,g){ return s+(ev.votes[g.id]||0); }, 0);
    var isOpen = ev.status === "open";
    var card = document.createElement("div");
    card.className = "event-card";
    card.dataset.id = ev.id;

    var gamesHtml = ev.games.map(function(g) {
      var v = ev.votes[g.id]||0;
      var pct = totalVotes ? Math.round(v/totalVotes*100) : 0;
      return '<div class="ev-game"><span>' + eh(g.title) + '</span><span class="ev-votes">' + v + ' 🌸 (' + pct + '%)</span></div>';
    }).join("");

    card.innerHTML =
      '<div class="event-top">' +
        '<div><div class="event-name">' + eh(ev.name) + '</div>' +
        (ev.date ? '<div class="event-date">📅 ' + fmtDate(ev.date) + '</div>' : '') + '</div>' +
        '<span class="' + (isOpen?'badge-open':'badge-closed') + '">' + (isOpen?'🟢 Offen':'🔒 Beendet') + '</span>' +
      '</div>' +
      '<div class="ev-games">' + gamesHtml + '</div>' +
      '<div class="ev-total">Gesamt: ' + totalVotes + ' Stimme' + (totalVotes!==1?'n':'') + '</div>' +
      '<div class="event-btns">' +
        '<button class="toggle-btn" data-action="toggle" data-newstatus="' + (isOpen?'closed':'open') + '">' + (isOpen?'🔒 Beenden':'🟢 Öffnen') + '</button>' +
        '<a class="vote-link" href="vote.html" target="_blank">🔗 Vote-Link</a>' +
        '<button class="del" data-action="del-event">🗑️</button>' +
      '</div>';

    card.addEventListener("click", function(e) {
      var btn = e.target.closest("[data-action]");
      if (!btn) return;
      if (btn.dataset.action === "toggle") { doToggleEvent(ev.id, btn.dataset.newstatus); }
      else if (btn.dataset.action === "del-event") { doDelEvent(ev.id, ev.name); }
    });

    el.appendChild(card);
  });
}

function doSubmitEvent() {
  var name = document.getElementById("ev-name").value.trim();
  var date = document.getElementById("ev-date").value.trim();
  var checked = Array.from(document.querySelectorAll(".game-pick:checked")).map(function(c){ return c.value; });
  if (!name) { showToast("❌ Bitte einen Namen eingeben"); return; }
  if (!date) { showToast("❌ Bitte ein Datum auswählen"); return; }
  if (checked.length < 2) { showToast("❌ Mindestens 2 Spiele auswählen"); return; }
  var btn = document.getElementById("create-event-btn");
  btn.disabled = true; btn.textContent = "Erstelle... 🦕";
  api({ action:"createEvent", name:name, date:date, gameIds:checked.join(","), pw:pw }).then(function(data) {
    if (data.ok) {
      document.getElementById("ev-name").value = "";
      document.getElementById("ev-date").value = "";
      document.querySelectorAll(".game-pick:checked").forEach(function(c){ c.checked = false; });
      showToast("🎀 Event erstellt!");
      loadEvents();
    } else { showToast("❌ " + (data.error||"Fehler")); }
  }).catch(function(){ showToast("❌ Verbindungsfehler"); })
  .finally(function(){ btn.disabled = false; btn.textContent = "Event erstellen 🦕"; });
}

function doToggleEvent(id, newStatus) {
  api({ action:"setEventStatus", id:id, status:newStatus, pw:pw }).then(function(data){
    if (data.ok) { showToast(newStatus==="closed"?"🔒 Beendet":"🟢 Geöffnet"); loadEvents(); }
    else { showToast("❌ " + (data.error||"Fehler")); }
  }).catch(function(){ showToast("❌ Verbindungsfehler"); });
}

function doDelEvent(id, name) {
  if (!confirm('"' + name + '" wirklich löschen?')) return;
  api({ action:"deleteEvent", id:id, pw:pw }).then(function(data){
    if (data.ok) { showToast("🗑️ Gelöscht"); loadEvents(); }
    else { showToast("❌ " + (data.error||"Fehler")); }
  }).catch(function(){ showToast("❌ Verbindungsfehler"); });
}

// Auto-login
if (pw) {
  api({ action:"checkPw", pw:pw }).then(function(d){
    if (d.ok) { showPanel(); loadGames(); loadEvents(); }
    else { sessionStorage.removeItem("adminpw"); pw = ""; }
  }).catch(function(){});
}
</script>
</body>
