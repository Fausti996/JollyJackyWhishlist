<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JollyJacky – Admin 🎀</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f3e5f5 100%); font-family: 'Segoe UI', system-ui, sans-serif; color: #4a1942; }
    header { text-align: center; padding: 26px 20px 14px; border-bottom: 2px dashed #f48fb1; }
    header .sub { font-size: 13px; font-weight: 700; color: #f06292; letter-spacing: 2px; text-transform: uppercase; }
    header h1 { font-size: 25px; font-weight: 900; color: #c2185b; margin-top: 2px; }
    header p { font-size: 13px; color: #e91e6399; margin-top: 6px; }

    .wrap { padding: 16px; max-width: 560px; margin: 0 auto; }

    /* Login */
    .login { background: #fff; border: 2px solid #fce4ec; border-radius: 16px; padding: 22px 18px; box-shadow: 0 2px 12px #f4849018; }
    .login label { font-size: 12px; font-weight: 700; color: #ad1457; display: block; margin-bottom: 6px; }
    .login input { width: 100%; border: 2px solid #f8bbd0; border-radius: 12px; padding: 12px; font-size: 14px; color: #880e4f; background: #fff; outline: none; font-family: inherit; margin-bottom: 12px; }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #f06292, #ce93d8); color: #fff; border: none; border-radius: 14px; padding: 13px; font-weight: 800; font-size: 15px; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .login-msg { font-size: 13px; font-weight: 700; color: #c62828; margin-top: 10px; min-height: 16px; text-align: center; }

    /* Panel */
    .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .panel-head .count { font-size: 13px; color: #ad1457; font-weight: 700; }
    .toolbar { display: flex; gap: 8px; }
    .btn-sm { background: #fff; border: 2px solid #f8bbd0; color: #c2185b; border-radius: 10px; padding: 7px 12px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: inherit; }

    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .chip { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid #f8bbd0; background: #fff; color: #c2185b; }
    .chip.active { background: #f48fb1; border-color: #e91e63; color: #fff; }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .row { background: #fff; border: 2px solid #fce4ec; border-radius: 14px; padding: 12px; box-shadow: 0 2px 12px #f4849018; }
    .row-top { display: flex; gap: 12px; align-items: center; }
    .thumb { width: 84px; height: 39px; flex-shrink: 0; border-radius: 6px; object-fit: cover; background: linear-gradient(135deg,#fce4ec,#f3e5f5); display: flex; align-items: center; justify-content: center; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; display: block; }
    .thumb .ph { font-size: 20px; opacity: 0.6; }
    .row-info { flex: 1; min-width: 0; }
    .row-title { font-size: 14px; font-weight: 800; color: #880e4f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-meta { font-size: 12px; color: #ad1457; margin-top: 2px; }
    .del { background: #fff; border: 2px solid #f8bbd0; color: #e91e63; border-radius: 10px; width: 38px; height: 38px; flex-shrink: 0; cursor: pointer; font-size: 16px; }
    .del:hover { background: #fce4ec; }

    .status-row { display: flex; gap: 6px; margin-top: 10px; }
    .status-btn { flex: 1; border: 2px solid #f8bbd0; background: #fff; border-radius: 10px; padding: 8px 4px; font-weight: 700; font-size: 12px; cursor: pointer; color: #c2185b; font-family: inherit; transition: all 0.12s; }
    .status-btn.active-wished { background: #fce4ec; border-color: #f48fb1; color: #c2185b; }
    .status-btn.active-planned { background: #f3e5f5; border-color: #ce93d8; color: #7b1fa2; }
    .status-btn.active-played { background: #ede7f6; border-color: #b39ddb; color: #4a148c; }

    .loading, .empty { text-align: center; padding: 50px 20px; color: #f48fb1; font-weight: 700; }
    .empty .dino { font-size: 38px; }
    .hidden { display: none; }

    .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #f06292, #ce93d8); color: #fff; padding: 11px 24px; border-radius: 24px; font-weight: 800; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px #f4849055; white-space: nowrap; }
    .toast.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="sub">JollyJacky</div>
  <h1>Admin-Bereich 🎀</h1>
  <p>Status ändern & aufräumen</p>
</header>

<div class="wrap">

  <!-- Login -->
  <div class="login" id="login">
    <label>Admin-Passwort</label>
    <input type="password" id="pw-input" placeholder="Passwort eingeben" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn-primary" id="login-btn" onclick="login()">Anmelden 🦕</button>
    <div class="login-msg" id="login-msg"></div>
  </div>

  <!-- Panel -->
  <div id="panel" class="hidden">
    <div class="panel-head">
      <span class="count" id="game-count"></span>
      <div class="toolbar">
        <button class="btn-sm" onclick="loadGames()">🔄 Neu laden</button>
        <button class="btn-sm" onclick="logout()">Abmelden</button>
      </div>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="chip active" onclick="setFilter('all')">Alle</button>
      <button class="chip" onclick="setFilter('wished')">Gewünscht</button>
      <button class="chip" onclick="setFilter('planned')">Geplant</button>
      <button class="chip" onclick="setFilter('played')">Gespielt</button>
    </div>

    <div class="list" id="list"><div class="loading">🦕 Lade...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5bJuYmzrBdZqvDLF5x6Xym6MchIpVFtwrHjbBI0PIHdbuq1hOVM_jcXRy1zkCW7OW/exec";

  let pw = sessionStorage.getItem("adminpw") || "";
  let games = [];
  let filter = "all";

  async function api(params) {
    const url = SCRIPT_URL + "?" + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.json();
  }

  async function login() {
    const val = document.getElementById("pw-input").value;
    const msg = document.getElementById("login-msg");
    const btn = document.getElementById("login-btn");
    if (!val) { msg.textContent = "Bitte Passwort eingeben"; return; }
    btn.disabled = true; btn.textContent = "Prüfe... 🦕"; msg.textContent = "";
    try {
      const data = await api({ action: "checkPw", pw: val });
      if (data.ok) {
        pw = val;
        sessionStorage.setItem("adminpw", pw);
        showPanel();
        loadGames();
      } else {
        msg.textContent = "❌ Falsches Passwort";
      }
    } catch(e) {
      msg.textContent = "❌ Verbindungsfehler";
    } finally {
      btn.disabled = false; btn.textContent = "Anmelden 🦕";
    }
  }

  function logout() {
    pw = "";
    sessionStorage.removeItem("adminpw");
    document.getElementById("panel").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("pw-input").value = "";
  }

  function showPanel() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
  }

  async function loadGames() {
    document.getElementById("list").innerHTML = '<div class="loading">🦕 Lade...</div>';
    try {
      const data = await api({ action: "getGames" });
      if (data.ok) {
        games = data.games.map(g => ({ ...g, votes: Number(g.votes), id: String(g.id) }));
        render();
      }
    } catch(e) {
      document.getElementById("list").innerHTML = '<div class="empty"><div class="dino">😕</div>Verbindungsfehler</div>';
    }
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll(".filter-row .chip").forEach(c => c.classList.remove("active"));
    event.target.classList.add("active");
    render();
  }

  function render() {
    const labels = { wished: "Gewünscht", planned: "Geplant", played: "Gespielt" };
    const filtered = games
      .filter(g => filter === "all" || g.status === filter)
      .sort((a,b) => b.votes - a.votes);

    document.getElementById("game-count").textContent = filtered.length + " Spiel(e)";
    const list = document.getElementById("list");

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="dino">🦕</div>Keine Spiele</div>';
      return;
    }

    list.innerHTML = filtered.map(g => `
      <div class="row">
        <div class="row-top">
          <div class="thumb">${g.cover ? `<img src="${escAttr(g.cover)}" alt="" onerror="this.parentNode.innerHTML='<span class=\\'ph\\'>🦕</span>'">` : `<span class="ph">🦕</span>`}</div>
          <div class="row-info">
            <div class="row-title">${escHtml(g.title)}</div>
            <div class="row-meta">🌸 ${g.votes} Votes · ${g.genre ? escHtml(g.genre) : "—"}</div>
          </div>
          <button class="del" onclick="del('${escAttr(g.id)}', '${escAttr(g.title)}')" title="Löschen">🗑️</button>
        </div>
        <div class="status-row">
          <button class="status-btn ${g.status === 'wished' ? 'active-wished' : ''}" onclick="setStatus('${escAttr(g.id)}','wished')">🌸 Gewünscht</button>
          <button class="status-btn ${g.status === 'planned' ? 'active-planned' : ''}" onclick="setStatus('${escAttr(g.id)}','planned')">💜 Geplant</button>
          <button class="status-btn ${g.status === 'played' ? 'active-played' : ''}" onclick="setStatus('${escAttr(g.id)}','played')">✅ Gespielt</button>
        </div>
      </div>
    `).join("");
  }

  async function setStatus(id, status) {
    const game = games.find(g => g.id === id);
    if (!game || game.status === status) return;
    const prev = game.status;
    game.status = status;          // optimistisch
    render();
    showToast("✓ Status geändert");
    try {
      const data = await api({ action: "setStatus", id, status, pw });
      if (!data.ok) { game.status = prev; render(); showToast("❌ " + (data.error || "Fehler")); }
    } catch(e) {
      game.status = prev; render(); showToast("❌ Verbindungsfehler");
    }
  }

  async function del(id, title) {
    if (!confirm('"' + title + '" wirklich löschen?')) return;
    const idx = games.findIndex(g => g.id === id);
    const backup = games[idx];
    games = games.filter(g => g.id !== id);   // optimistisch
    render();
    try {
      const data = await api({ action: "deleteGame", id, pw });
      if (!data.ok) { games.splice(idx, 0, backup); render(); showToast("❌ " + (data.error || "Fehler")); }
      else showToast("🗑️ Gelöscht");
    } catch(e) {
      games.splice(idx, 0, backup); render(); showToast("❌ Verbindungsfehler");
    }
  }

  function escHtml(str) { return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function escAttr(str) { return String(str).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"\\'").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  // Auto-Login falls Passwort aus dieser Session noch da ist
  if (pw) {
    api({ action: "checkPw", pw }).then(d => {
      if (d.ok) { showPanel(); loadGames(); } else { sessionStorage.removeItem("adminpw"); pw=""; }
    }).catch(()=>{});
  }
</script>
</body>
</html>
