<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JollyJacky – Community Vote 🦕</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f3e5f5 100%); font-family: 'Segoe UI', system-ui, sans-serif; color: #4a1942; }
    header { text-align: center; padding: 26px 20px 14px; border-bottom: 2px dashed #f48fb1; }
    header .sub { font-size: 13px; font-weight: 700; color: #f06292; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    header h1 { font-size: 26px; font-weight: 900; color: #c2185b; }
    header p { font-size: 13px; color: #e91e6399; margin-top: 5px; }

    .wrap { padding: 16px 16px 60px; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .loading { text-align: center; padding: 60px 20px; color: #f48fb1; font-weight: 700; font-size: 15px; }
    .empty { text-align: center; padding: 60px 20px; color: #f48fb1; }
    .empty .dino { font-size: 44px; margin-bottom: 10px; }
    .empty p { font-weight: 700; font-size: 15px; }
    .empty small { font-size: 13px; opacity: 0.7; display: block; margin-top: 6px; }

    /* Event card */
    .event { background: #fff; border: 2px solid #fce4ec; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 14px #f4849018; }
    .event-head { padding: 16px 16px 12px; border-bottom: 1.5px dashed #fce4ec; }
    .event-name { font-size: 18px; font-weight: 900; color: #c2185b; }
    .event-meta { font-size: 12px; color: #ad1457; margin-top: 4px; display: flex; gap: 10px; align-items: center; }
    .badge-open { background: #fce4ec; color: #c2185b; border: 1.5px solid #f48fb1; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
    .badge-closed { background: #ede7f6; color: #4a148c; border: 1.5px solid #b39ddb; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; }

    .games { display: flex; flex-direction: column; gap: 0; }
    .game-row { padding: 12px 16px; border-bottom: 1px solid #fce4ec; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.1s; }
    .game-row:last-child { border-bottom: none; }
    .game-row:active { background: #fce4ec22; }
    .game-row.voted-this { background: #fce4ec33; cursor: default; }

    .gthumb { width: 72px; height: 34px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: linear-gradient(135deg,#fce4ec,#f3e5f5); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .gthumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .ginfo { flex: 1; min-width: 0; }
    .gtitle { font-size: 14px; font-weight: 800; color: #880e4f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .genre-badge { font-size: 11px; background: #fce4ec; color: #ad1457; border-radius: 5px; padding: 1px 7px; font-weight: 600; display: inline-block; margin-top: 3px; }

    .vote-side { text-align: right; flex-shrink: 0; min-width: 80px; }
    .vote-count { font-size: 20px; font-weight: 900; color: #f06292; }
    .vote-pct { font-size: 11px; color: #ad1457; font-weight: 600; }
    .vote-bar-wrap { height: 5px; background: #fce4ec; border-radius: 3px; margin-top: 4px; width: 80px; }
    .vote-bar { height: 5px; background: linear-gradient(90deg,#f06292,#ce93d8); border-radius: 3px; transition: width 0.4s; }

    .vote-btn-wrap { padding: 12px 16px 16px; }
    .vote-btn { width: 100%; background: linear-gradient(135deg, #f06292, #ce93d8); color: #fff; border: none; border-radius: 13px; padding: 13px; font-weight: 800; font-size: 15px; cursor: pointer; transition: opacity 0.15s; }
    .vote-btn:disabled { opacity: 0.5; cursor: default; }
    .voted-msg { text-align: center; padding: 10px 16px 16px; font-size: 13px; font-weight: 700; color: #c2185b; }
    .closed-msg { text-align: center; padding: 10px 16px 16px; font-size: 13px; color: #9c6fa0; }

    .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#f06292,#ce93d8); color: #fff; padding: 11px 24px; border-radius: 24px; font-weight: 800; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px #f4849055; white-space: nowrap; }
    .toast.show { display: block; }

    .back-link { text-align: center; padding: 0 0 6px; font-size: 13px; color: #f48fb1; font-weight: 700; }
    .back-link a { color: #f06292; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="sub">JollyJacky</div>
  <h1>Community Vote 🗳️</h1>
  <p>Was soll beim nächsten Event gezockt werden? 🎀</p>
</header>

<div class="wrap" id="wrap">
  <div class="loading">🦕 Lade Events...</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5bJuYmzrBdZqvDLF5x6Xym6MchIpVFtwrHjbBI0PIHdbuq1hOVM_jcXRy1zkCW7OW/exec";
  let voted = JSON.parse(localStorage.getItem("event_voted") || "{}");
  let events = [];
  let selected = {};

  async function api(params) {
    const url = SCRIPT_URL + "?" + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.json();
  }

  async function load() {
    try {
      const data = await api({ action: "getEvents" });
      if (data.ok) { events = data.events; render(); }
      else { error("Fehler beim Laden"); }
    } catch(e) { error("Verbindungsfehler"); }
  }

  function error(msg) {
    document.getElementById("wrap").innerHTML = `<div class="empty"><div class="dino">😕</div><p>${msg}</p></div>`;
  }

  function render() {
    const wrap = document.getElementById("wrap");
    const active = events.filter(e => e.status === "open");
    const closed = events.filter(e => e.status === "closed");
    const all = [...active, ...closed];

    if (!all.length) {
      wrap.innerHTML = `<div class="empty"><div class="dino">🦕</div><p>Keine aktiven Events</p><small>Jacky erstellt bald ein neues!</small></div>`;
      return;
    }

    wrap.innerHTML = all.map(ev => buildEvent(ev)).join("") +
      `<div class="back-link"><a href="index.html">← Zurück zur Wunschliste</a></div>`;
  }

  function buildEvent(ev) {
    const isOpen = ev.status === "open";
    const hasVoted = !!voted[ev.id];
    const totalVotes = ev.games.reduce((s,g) => s + (ev.votes[g.id] || 0), 0);
    const selId = selected[ev.id] || null;

    const gamesHtml = ev.games.map(g => {
      const v = ev.votes[g.id] || 0;
      const pct = totalVotes ? Math.round(v / totalVotes * 100) : 0;
      const isSel = selId === g.id;
      return `
        <div class="game-row ${isSel ? 'voted-this' : ''}" onclick="${isOpen && !hasVoted ? `selectGame('${ev.id}','${g.id}')` : ''}">
          <div class="gthumb">${g.cover ? `<img src="${escAttr(g.cover)}" alt="" onerror="this.parentNode.innerHTML='🦕'">` : '🦕'}</div>
          <div class="ginfo">
            <div class="gtitle">${escHtml(g.title)}</div>
            ${g.genre ? `<span class="genre-badge">${escHtml(g.genre)}</span>` : ''}
          </div>
          <div class="vote-side">
            <div class="vote-count">${v}</div>
            <div class="vote-pct">${pct}%</div>
            <div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }).join("");

    const footer = !isOpen
      ? `<div class="closed-msg">🔒 Abstimmung beendet</div>`
      : hasVoted
        ? `<div class="voted-msg">🎀 Du hast bereits abgestimmt!</div>`
        : `<div class="vote-btn-wrap"><button class="vote-btn" id="vbtn-${ev.id}" onclick="submitVote('${ev.id}')" disabled>Abstimmen 🦕</button></div>`;

    return `
      <div class="event" id="event-${escAttr(ev.id)}">
        <div class="event-head">
          <div class="event-name">${escHtml(ev.name)}</div>
          <div class="event-meta">
            ${ev.date ? `📅 ${escHtml(ev.date)}` : ''}
            <span class="${isOpen ? 'badge-open' : 'badge-closed'}">${isOpen ? '🟢 Offen' : '🔒 Beendet'}</span>
          </div>
        </div>
        <div class="games">${gamesHtml}</div>
        ${footer}
      </div>`;
  }

  function selectGame(eventId, gameId) {
    selected[eventId] = gameId;
    const btn = document.getElementById("vbtn-" + eventId);
    if (btn) btn.disabled = false;
    render();
  }

  async function submitVote(eventId) {
    const gameId = selected[eventId];
    if (!gameId || voted[eventId]) return;
    const btn = document.getElementById("vbtn-" + eventId);
    if (btn) { btn.disabled = true; btn.textContent = "Wird gespeichert... 🦕"; }
    try {
      const data = await api({ action: "eventVote", eventId, gameId });
      if (data.ok) {
        voted[eventId] = gameId;
        localStorage.setItem("event_voted", JSON.stringify(voted));
        const ev = events.find(e => e.id === eventId);
        if (ev) { ev.votes[gameId] = (ev.votes[gameId] || 0) + 1; }
        render();
        showToast("🎀 Stimme gezählt!");
      } else {
        showToast("❌ " + (data.error || "Fehler"));
        if (btn) { btn.disabled = false; btn.textContent = "Abstimmen 🦕"; }
      }
    } catch(e) {
      showToast("❌ Verbindungsfehler");
      if (btn) { btn.disabled = false; btn.textContent = "Abstimmen 🦕"; }
    }
  }

  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function escAttr(s) { return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  load();
</script>
</body>
</html>
