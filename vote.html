<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JollyJacky – Community Vote 🦕</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f3e5f5 100%); font-family: 'Segoe UI', system-ui, sans-serif; color: #4a1942; }
    header { text-align: center; padding: 26px 20px 14px; border-bottom: 2px dashed #f48fb1; }
    header .sub { font-size: 13px; font-weight: 700; color: #f06292; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    header h1 { font-size: 26px; font-weight: 900; color: #c2185b; }
    header p { font-size: 13px; color: #e91e6399; margin-top: 5px; }

    .wrap { padding: 16px 16px 60px; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    .loading { text-align: center; padding: 60px 20px; color: #f48fb1; font-weight: 700; font-size: 15px; }
    .empty { text-align: center; padding: 60px 20px; color: #f48fb1; }
    .empty .dino { font-size: 44px; margin-bottom: 10px; }
    .empty p { font-weight: 700; font-size: 15px; }
    .empty small { font-size: 13px; opacity: 0.7; display: block; margin-top: 6px; }

    /* Event card */
    .event { background: #fff; border: 2px solid #fce4ec; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 14px #f4849018; }
    .event-head { padding: 16px 16px 12px; border-bottom: 1.5px dashed #fce4ec; }
    .event-name { font-size: 18px; font-weight: 900; color: #c2185b; }
    .event-meta { font-size: 12px; color: #ad1457; margin-top: 4px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .badge-open { background: #fce4ec; color: #c2185b; border: 1.5px solid #f48fb1; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; }
    .badge-closed { background: #ede7f6; color: #4a148c; border: 1.5px solid #b39ddb; border-radius: 8px; padding: 2px 9px; font-size: 11px; font-weight: 700; }

    .games { display: flex; flex-direction: column; gap: 0; }

    /* Game row */
    .game-row { padding: 12px 14px; border-bottom: 1px solid #fce4ec; display: flex; align-items: center; gap: 12px; }
    .game-row:last-child { border-bottom: none; }

    .gthumb { width: 72px; height: 34px; flex-shrink: 0; border-radius: 6px; overflow: hidden; background: linear-gradient(135deg,#fce4ec,#f3e5f5); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .gthumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .ginfo { flex: 1; min-width: 0; }
    .gtitle { font-size: 14px; font-weight: 800; color: #880e4f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ggenre { font-size: 11px; background: #fce4ec; color: #ad1457; border-radius: 5px; padding: 1px 7px; font-weight: 600; display: inline-block; margin-top: 3px; }

    /* Vote button (same style as main page) */
    .vote-btn { display: flex; align-items: center; gap: 6px; background: #fff; border: 2px solid #f8bbd0; color: #e91e63; border-radius: 12px; padding: 7px 13px; cursor: pointer; font-weight: 800; font-size: 14px; font-family: inherit; transition: all 0.15s; flex-shrink: 0; }
    .vote-btn.voted { background: linear-gradient(135deg, #f48fb1, #ce93d8); border-color: #f06292; color: #fff; cursor: default; }
    .vote-btn.disabled-other { opacity: 0.45; cursor: default; }
    .vote-count { font-size: 17px; font-weight: 900; color: #c2185b; }
    .vote-btn.voted .vote-count { color: #fff; }

    /* Results bar (shown after voting or if closed) */
    .result-wrap { padding: 0 14px 14px; }
    .result-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .result-row:last-child { margin-bottom: 0; }
    .result-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: #ad1457; }
    .result-bar-bg { height: 8px; background: #fce4ec; border-radius: 4px; }
    .result-bar { height: 8px; background: linear-gradient(90deg, #f06292, #ce93d8); border-radius: 4px; transition: width 0.5s; }

    .closed-msg { text-align: center; padding: 10px 14px 14px; font-size: 13px; color: #9c6fa0; }
    .voted-msg { text-align: center; padding: 10px 14px 14px; font-size: 13px; font-weight: 700; color: #c2185b; }

    .back-link { text-align: center; font-size: 13px; }
    .back-link a { color: #f06292; font-weight: 700; text-decoration: none; }

    .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#f06292,#ce93d8); color: #fff; padding: 11px 24px; border-radius: 24px; font-weight: 800; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px #f4849055; white-space: nowrap; }
    .toast.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="sub">JollyJacky</div>
  <h1>Community Vote 🗳️</h1>
  <p>Was soll beim nächsten Event gezockt werden? 🎀</p>
</header>

<div class="wrap" id="wrap">
  <div class="loading">🦕 Lade Events...</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====== Supabase-Konfiguration ======
const SUPABASE_URL = "https://xwsgykzubzmkmhohlhmd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3c2d5a3p1Ynpta21ob2hsaG1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDg1NjQsImV4cCI6MjA5NzcyNDU2NH0.inTWUbfQoMQmiq8D0YgxyLDQjUmpIfeWmM9Mj-kXXQc";
const STEAM_PROXY_URL = "https://xwsgykzubzmkmhohlhmd.supabase.co/functions/v1/steam-proxy";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function jjVoterKey() {
  try {
    var k = localStorage.getItem("jj_voter_key");
    if (!k) {
      k = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ("k" + Date.now() + "_" + Math.random());
      localStorage.setItem("jj_voter_key", k);
    }
    return k;
  } catch (e) {
    if (!window.__jjvk) window.__jjvk = "k" + Date.now() + "_" + Math.random();
    return window.__jjvk;
  }
}
var VOTER_KEY = jjVoterKey();
var voted = JSON.parse(localStorage.getItem("event_voted") || "{}");
var eventsData = [];

async function api(params) {
  var action = params.action;
  var H = { headers: { Authorization: "Bearer " + SUPABASE_ANON_KEY, apikey: SUPABASE_ANON_KEY } };
  try {
    if (action === "getGames") {
      var r = await db.from("games").select("*");
      if (r.error) throw r.error;
      var games = (r.data || []).map(function (g) {
        return { id: String(g.id), title: g.title, genre: g.genre, tag: g.tag,
          status: g.status, votes: Number(g.votes) || 0, cover: g.cover,
          steamUrl: g.steam_url, timesPlayed: Number(g.times_played) || 0 };
      });
      return { ok: true, games: games };
    }
    if (action === "addGame") {
      var r = await db.rpc("add_game", { p_title: params.title || "", p_genre: params.genre || "", p_tag: params.tag || "", p_cover: params.cover || "", p_steam_url: params.steamUrl || "" });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "vote") {
      var r = await db.rpc("vote_game", { p_game_id: Number(params.id), p_voter_key: VOTER_KEY });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "checkPw") {
      var r = await db.rpc("check_admin", { p_password: params.pw || "" });
      if (r.error) throw r.error; return { ok: !!r.data };
    }
    if (action === "setStatus") {
      var r = await db.rpc("admin_set_status", { p_password: params.pw || "", p_id: Number(params.id), p_status: params.status });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "markPlayed") {
      var r = await db.rpc("admin_mark_played", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "deleteGame") {
      var r = await db.rpc("admin_delete_game", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "getEvents") {
      var r = await db.rpc("get_events");
      if (r.error) throw r.error; return { ok: true, events: r.data || [] };
    }
    if (action === "createEvent") {
      var ids = String(params.gameIds || "").split(",").filter(Boolean).map(Number);
      var r = await db.rpc("admin_create_event", { p_password: params.pw || "", p_name: params.name || "", p_date: params.date || "", p_game_ids: ids });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "setEventStatus") {
      var r = await db.rpc("admin_set_event_status", { p_password: params.pw || "", p_id: Number(params.id), p_status: params.status });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "deleteEvent") {
      var r = await db.rpc("admin_delete_event", { p_password: params.pw || "", p_id: Number(params.id) });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "eventVote") {
      var r = await db.rpc("event_vote", { p_event_id: Number(params.eventId), p_game_id: Number(params.gameId), p_voter_key: VOTER_KEY });
      if (r.error) throw r.error; return r.data;
    }
    if (action === "steamSearch") {
      if (!STEAM_PROXY_URL) return { ok: true, results: [] };
      var res = await fetch(STEAM_PROXY_URL + "?action=search&term=" + encodeURIComponent(params.term || ""), H);
      return await res.json();
    }
    if (action === "steamInfo") {
      if (!STEAM_PROXY_URL) return { ok: false, error: "steam_proxy_not_configured" };
      var res2 = await fetch(STEAM_PROXY_URL + "?action=info&appId=" + encodeURIComponent(params.appId || ""), H);
      return await res2.json();
    }
    return { ok: false, error: "unknown_action: " + action };
  } catch (e) {
    return { ok: false, error: (e && e.message) ? e.message : String(e) };
  }
}

function eh(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function ea(s) { return String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function fmtDate(d) {
  if (!d) return '';
  var s = String(d);
  // ISO format: 2026-07-22 or 2026-07-22T...
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3] + '.' + m[2] + '.' + m[1];
  return s;
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

function load() {
  api({ action: "getEvents" }).then(function(data) {
    if (data.ok) { eventsData = data.events; render(); }
    else { showError("Fehler beim Laden"); }
  }).catch(function(){ showError("Verbindungsfehler"); });
}

function showError(msg) {
  document.getElementById("wrap").innerHTML =
    '<div class="empty"><div class="dino">😕</div><p>' + msg + '</p></div>';
}

function render() {
  var wrap = document.getElementById("wrap");
  var active = eventsData.filter(function(e){ return e.status === "open"; });
  var closed = eventsData.filter(function(e){ return e.status === "closed"; });
  var all = active.concat(closed);

  if (!all.length) {
    wrap.innerHTML =
      '<div class="empty"><div class="dino">🦕</div><p>Keine aktiven Events</p><small>Jacky erstellt bald ein neues!</small></div>' +
      '<div class="back-link"><a href="index.html">← Zurück zur Wunschliste</a></div>';
    return;
  }

  wrap.innerHTML = "";
  all.forEach(function(ev) { wrap.appendChild(buildEventCard(ev)); });
  var back = document.createElement("div");
  back.className = "back-link";
  back.innerHTML = '<a href="index.html">← Zurück zur Wunschliste</a>';
  wrap.appendChild(back);
}

function buildEventCard(ev) {
  var isOpen = ev.status === "open";
  var hasVoted = !!voted[ev.id];
  var showResults = hasVoted || !isOpen;
  var totalVotes = ev.games.reduce(function(s,g){ return s+(Number(ev.votes[g.id])||0); }, 0);

  var card = document.createElement("div");
  card.className = "event";

  // Header
  var head = document.createElement("div");
  head.className = "event-head";
  head.innerHTML =
    '<div class="event-name">' + eh(ev.name) + '</div>' +
    '<div class="event-meta">' +
      (ev.date ? '📅 ' + fmtDate(ev.date) : '') +
      '<span class="' + (isOpen ? 'badge-open' : 'badge-closed') + '">' + (isOpen ? '🟢 Abstimmung läuft' : '🔒 Beendet') + '</span>' +
    '</div>';
  card.appendChild(head);

  // Always show vote buttons + results at the same time
  var gamesDiv = document.createElement("div");
  gamesDiv.className = "games";
  ev.games.forEach(function(g) {
    var v = Number(ev.votes[g.id])||0;
    var pct = totalVotes ? Math.round(v/totalVotes*100) : 0;
    var myVote = voted[ev.id] === g.id;

    var row = document.createElement("div");
    row.className = "game-row";
    row.style.flexDirection = "column";
    row.style.alignItems = "stretch";
    row.style.gap = "8px";

    var thumbHtml = g.cover ? '<img src="' + ea(g.cover) + '" alt="" onerror="this.parentNode.innerHTML=\'🦕\'">' : '🦕';

    // Top: thumb + info + button
    var topRow = document.createElement("div");
    topRow.style.cssText = "display:flex;align-items:center;gap:12px";
    topRow.innerHTML =
      '<div class="gthumb">' + thumbHtml + '</div>' +
      '<div class="ginfo">' +
        '<div class="gtitle">' + eh(g.title) + '</div>' +
        (g.genre ? '<span class="ggenre">' + eh(g.genre) + '</span>' : '') +
      '</div>';

    if (isOpen && !hasVoted) {
      // Show vote button
      var btn = document.createElement("button");
      btn.className = "vote-btn";
      btn.innerHTML = '🌸 <span class="vote-count">' + v + '</span>';
      (function(evId, gId){ btn.addEventListener("click", function(){ doVote(evId, gId); }); })(ev.id, g.id);
      topRow.appendChild(btn);
    } else {
      // Show vote count only
      var countDiv = document.createElement("div");
      countDiv.style.cssText = "text-align:right;flex-shrink:0";
      countDiv.innerHTML = '<div style="font-size:18px;font-weight:900;color:' + (myVote?'#f06292':'#c2185b') + '">' + v + ' 🌸</div>';
      if (myVote) {
        var myLabel = document.createElement("div");
        myLabel.style.cssText = "font-size:11px;color:#f06292;font-weight:700;text-align:right";
        myLabel.textContent = "Deine Wahl";
        countDiv.appendChild(myLabel);
      }
      topRow.appendChild(countDiv);
    }
    row.appendChild(topRow);

    // Bar (always shown)
    var barWrap = document.createElement("div");
    barWrap.className = "result-bar-bg";
    var bar = document.createElement("div");
    bar.className = "result-bar";
    bar.style.cssText = "width:" + pct + "%;background:" + (myVote ? "linear-gradient(90deg,#c2185b,#f06292)" : "linear-gradient(90deg,#f06292,#ce93d8)");
    barWrap.appendChild(bar);

    var barLabel = document.createElement("div");
    barLabel.style.cssText = "font-size:11px;color:#ad1457;font-weight:600;text-align:right";
    barLabel.textContent = pct + "%";

    row.appendChild(barWrap);
    row.appendChild(barLabel);
    gamesDiv.appendChild(row);
  });
  card.appendChild(gamesDiv);

  if (hasVoted) {
    var msg = document.createElement("div");
    msg.className = "voted-msg";
    msg.textContent = "🎀 Du hast bereits abgestimmt!";
    card.appendChild(msg);
  } else if (!isOpen) {
    var cmsg = document.createElement("div");
    cmsg.className = "closed-msg";
    cmsg.textContent = "🔒 Abstimmung beendet";
    card.appendChild(cmsg);
  }

  return card;
}

function doVote(eventId, gameId) {
  if (voted[eventId]) return;
  voted[eventId] = gameId;
  localStorage.setItem("event_voted", JSON.stringify(voted));

  // Update local data optimistically
  var ev = eventsData.find(function(e){ return e.id === eventId; });
  if (ev) {
    ev.votes[gameId] = (Number(ev.votes[gameId])||0) + 1;
  }
  render();
  showToast("🎀 Stimme gezählt!");

  // Save to sheet
  api({ action: "eventVote", eventId: eventId, gameId: gameId }).catch(function(){
    // Vote already counted locally — not critical
  });
}

load();

// ====== Live-Updates (Realtime) ======
db.channel("rt-vote")
  .on("postgres_changes", { event: "INSERT", schema: "public", table: "event_votes" }, function (payload) {
    var nv = payload.new;
    if (nv.voter_key === VOTER_KEY) return; // eigene Stimme schon optimistisch gezaehlt
    var e = eventsData.find(function (x) { return String(x.id) === String(nv.event_id); });
    if (e) {
      var gid = String(nv.game_id);
      e.votes[gid] = (Number(e.votes[gid]) || 0) + 1;
      render();
    }
  })
  .on("postgres_changes", { event: "*", schema: "public", table: "events" }, function () {
    load(); // Event geoeffnet/geschlossen -> frisch laden
  })
  .subscribe();
</script>
</body>
</html>
